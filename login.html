<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centre Loco - Connexion</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="index.html"><img class="site-logo" src="images/logo.png.jpeg" alt="Logo Centre Loco"><span>CENTRE LOCO</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Afficher le menu"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
            <li class="nav-item"><a class="nav-link" href="a-propos.html">A propos</a></li>
            <li class="nav-item"><a class="nav-link" href="formations.html">Formations</a></li>
            <li class="nav-item"><a class="nav-link" href="actualites.html">Actualites</a></li>
            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            <li class="nav-item"><a class="nav-link active" aria-current="page" href="login.html">Connexion</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="login-section">
    <div class="container">
      <div class="row">
        <div class="col-md-4 offset-md-4">
          <div class="card shadow">
            <div class="card-body p-4">
              <h1 class="h3 fw-bold text-center mb-4">Connexion</h1>
              <form method="post">
                <div class="mb-3">
                  <label class="form-label" for="loginEmail">Email</label>
                  <input class="form-control" type="email" id="loginEmail" name="loginEmail" required>
                </div>
                <div class="mb-3">
                  <label class="form-label" for="loginPassword">Mot de passe</label>
                  <input class="form-control" type="password" id="loginPassword" name="loginPassword" minlength="8" required>
                </div>
                <button class="btn btn-loco w-100" type="submit">Se connecter</button>
              </form>
              <div class="d-flex justify-content-between gap-3 mt-3 small">
                <a href="contact.html" class="link-primary">Mot de passe oublie ?</a>
                <a href="contact.html" class="link-primary">Inscription</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer py-4">
    <div class="container d-flex flex-column flex-md-row justify-content-between gap-2">
      <p class="mb-0">&copy; 2026 Centre Loco - Tous droits reserves.</p>
      <p class="mb-0"><a href="contact.html">Rejoindre le centre</a></p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
